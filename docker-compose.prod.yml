services:
  navisha-english-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: navisha-english-backend:latest
    container_name: navisha-english-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8020:8020"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8020/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  navisha-english-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://english.navisha.cloud/api/v1
    image: navisha-english-frontend:latest
    container_name: navisha-english-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3020:3020"
    depends_on:
      navisha-english-backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3020"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
